<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulator Draft & Ban</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 12px; border-top: 4px solid #3b82f6; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .status-bar { background: #0f172a; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; border: 1px solid #3b82f6; }
        .current-turn { font-size: 1.2rem; font-weight: bold; color: #3b82f6; text-transform: uppercase; }

        .draft-area { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 20px; }
        .team-box { flex: 1; background: #0f172a; padding: 15px; border-radius: 8px; }
        .team-a { border-left: 4px solid #3b82f6; }
        .team-b { border-right: 4px solid #ef4444; text-align: right; }

        .slot-title { font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; }
        .picks, .bans { display: flex; gap: 5px; flex-wrap: wrap; }
        .team-b .picks, .team-b .bans { justify-content: flex-end; }
        
        /* Modifikasi Slot agar Gambar Pas */
        .slot { width: 60px; height: 60px; background: #1e293b; border: 1px dashed #334155; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .slot.ban { width: 45px; height: 45px; border-color: #ef4444; }
        .slot.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; font-size: 9px; text-align: center; padding: 3px 0; font-weight: bold;}

        .hero-pool { background: #0f172a; padding: 15px; border-radius: 8px; max-height: 400px; overflow-y: auto; border: 1px solid #334155;}
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; margin-top: 10px; }
        
        /* Modifikasi Item Hero di Pool untuk Gambar */
        .hero-item { background: #1e293b; padding: 8px 5px; border-radius: 6px; text-align: center; cursor: pointer; transition: 0.2s; border: 1px solid transparent; display: flex; flex-direction: column; align-items: center; }
        .hero-item:hover { border-color: #3b82f6; background: #334155; transform: scale(1.05); }
        .hero-item.disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(100%); transform: none; }
        .hero-pool-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-bottom: 5px; border: 1px solid #94a3b8;}
        .hero-pool-name { font-size: 10px; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        .btn-reset { width: 100%; padding: 12px; background: #ef4444; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .nav-link { display: inline-block; margin-bottom: 20px; color: #3b82f6; text-decoration: none; font-weight: bold; }
        .btn-submit { width: 100%; padding: 15px; background: #10b981; color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; display: none; margin-top: 10px;}
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="nav-link">⬅ Kembali ke Dashboard Setup</a>
        
        <div class="header">
            <h2>Simulator Draft Kompetitif</h2>
        </div>

        <div class="status-bar">
            <div id="turnLabel" class="current-turn">Memulai Draft...</div>
            <div id="turnStep" style="font-size: 12px; color: #94a3b8; margin-top: 5px;">Giliran 1 dari 20</div>
        </div>

        <div class="draft-area">
            <div class="team-box team-a">
                <h3 style="color: #3b82f6; margin-bottom: 15px;">Tim Kita (A)</h3>
                <div class="slot-title">Banned</div>
                <div class="bans" id="bansA">
                    <div class="slot ban" id="ban-a-1"></div>
                    <div class="slot ban" id="ban-a-2"></div>
                    <div class="slot ban" id="ban-a-3"></div>
                    <div class="slot ban" id="ban-a-4"></div>
                    <div class="slot ban" id="ban-a-5"></div>
                </div>
                <div class="slot-title" style="margin-top: 20px;">Picks</div>
                <div class="picks" id="picksA">
                    <div class="slot" id="pick-a-1"></div>
                    <div class="slot" id="pick-a-2"></div>
                    <div class="slot" id="pick-a-3"></div>
                    <div class="slot" id="pick-a-4"></div>
                    <div class="slot" id="pick-a-5"></div>
                </div>
            </div>

            <div class="team-box team-b">
                <h3 style="color: #ef4444; margin-bottom: 15px;">Lawan (B)</h3>
                <div class="slot-title">Banned</div>
                <div class="bans" id="bansB">
                    <div class="slot ban" id="ban-b-1"></div>
                    <div class="slot ban" id="ban-b-2"></div>
                    <div class="slot ban" id="ban-b-3"></div>
                    <div class="slot ban" id="ban-b-4"></div>
                    <div class="slot ban" id="ban-b-5"></div>
                </div>
                <div class="slot-title" style="margin-top: 20px;">Picks</div>
                <div class="picks" id="picksB">
                    <div class="slot" id="pick-b-1"></div>
                    <div class="slot" id="pick-b-2"></div>
                    <div class="slot" id="pick-b-3"></div>
                    <div class="slot" id="pick-b-4"></div>
                    <div class="slot" id="pick-b-5"></div>
                </div>
            </div>
        </div>

        <div class="hero-pool">
            <div class="slot-title" style="text-align: center; border-bottom: 1px solid #334155; padding-bottom: 10px;">Daftar Hero (Klik untuk Memilih)</div>
            <div class="hero-grid" id="heroGrid"></div>
        </div>

        <button class="btn-reset" onclick="resetDraft()">Reset Draft</button>
        <button id="btnLanjut" class="btn-submit" onclick="lanjutKeLog()">Selesai Draft & Lanjut ke Ruang Ganti ➡</button>
    </div>

    <script>
        const heroes = [
            "Miya", "Balmond", "Saber", "Alice", "Nana", "Tigreal", "Alucard", "Karina", "Akai", "Franco", 
            "Bane", "Bruno", "Clint", "Rafaela", "Eudora", "Zilong", "Fanny", "Layla", "Minotaur", "Lolita", 
            "Hayabusa", "Freya", "Gord", "Natalia", "Kagura", "Chou", "Sun", "Alpha", "Ruby", "Yi Sun-shin", 
            "Moskov", "Johnson", "Cyclops", "Estes", "Hilda", "Aurora", "Lapu-Lapu", "Vexana", "Roger", "Karrie", 
            "Gatotkaca", "Harley", "Irithel", "Grock", "Argus", "Odette", "Lancelot", "Diggie", "Hylos", "Zhask", 
            "Helcurt", "Pharsa", "Lesley", "Jawhead", "Angela", "Gusion", "Valir", "Martis", "Uranus", "Hanabi", 
            "Chang'e", "Kaja", "Selena", "Aldous", "Claude", "Vale", "Leomord", "Lunox", "Hanzo", "Belerick", 
            "Kimmy", "Thamuz", "Harith", "Minsitthar", "Kadita", "Faramis", "Badang", "Khufra", "Granger", "Guinevere", 
            "Esmeralda", "Terizla", "X.Borg", "Ling", "Dyrroth", "Lylia", "Baxia", "Masha", "Wanwan", "Silvanna", 
            "Cecilion", "Carmilla", "Atlas", "Popol and Kupa", "Yu Zhong", "Khaleed", "Barats", "Brody", "Benedetta", 
            "Mathilda", "Paquito", "Yve", "Beatrix", "Phoveus", "Gloo", "Natan", "Aulus", "Floryn", "Valentina", 
            "Edith", "Yin", "Melissa", "Xavier", "Julian", "Fredrinn", "Joy", "Arlott", "Novaria", "Ixia", 
            "Nolan", "Cici", "Chip", "Zhuxin", "Suyou", "Lukas", "Luo Yi", "Aamon", "Kalea", "Zetian", 
            "Obsidia", "Sora", "Marcel"
        ];
        
        const sequence = [
            { t: 'A', type: 'ban', id: 'ban-a-1' }, { t: 'B', type: 'ban', id: 'ban-b-1' },
            { t: 'A', type: 'ban', id: 'ban-a-2' }, { t: 'B', type: 'ban', id: 'ban-b-2' },
            { t: 'A', type: 'ban', id: 'ban-a-3' }, { t: 'B', type: 'ban', id: 'ban-b-3' },
            { t: 'A', type: 'pick', id: 'pick-a-1' }, { t: 'B', type: 'pick', id: 'pick-b-1' },
            { t: 'B', type: 'pick', id: 'pick-b-2' }, { t: 'A', type: 'pick', id: 'pick-a-2' },
            { t: 'A', type: 'pick', id: 'pick-a-3' }, { t: 'B', type: 'pick', id: 'pick-b-3' },
            { t: 'B', type: 'ban', id: 'ban-b-4' }, { t: 'A', type: 'ban', id: 'ban-a-4' },
            { t: 'B', type: 'ban', id: 'ban-b-5' }, { t: 'A', type: 'ban', id: 'ban-a-5' },
            { t: 'B', type: 'pick', id: 'pick-b-4' }, { t: 'A', type: 'pick', id: 'pick-a-4' },
            { t: 'A', type: 'pick', id: 'pick-a-5' }, { t: 'B', type: 'pick', id: 'pick-b-5' }
        ];

        let currentTurn = 0;
        let selectedHeroes = [];

        // Fungsi Pembersih Nama (Menghapus spasi dan jadikan huruf kecil)
        function formatImgName(name) {
            return name.replace(/\s+/g, '').toLowerCase();
        }

        // Tampilkan 120+ Hero beserta fotonya di kotak bawah
        function init() {
            const grid = document.getElementById('heroGrid');
            grid.innerHTML = '';
            heroes.sort().forEach(h => {
                const imgName = formatImgName(h);
                const div = document.createElement('div');
                div.className = 'hero-item';
                div.id = `hero-${h}`;
                
                // Masukkan gambar dan nama dengan pelindung onerror
                div.innerHTML = `
                    <img src="assets/heroes/${imgName}.png" class="hero-pool-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'40\\' height=\\'40\\'><circle cx=\\'20\\' cy=\\'20\\' r=\\'20\\' fill=\\'%23334155\\'/></svg>'">
                    <span class="hero-pool-name" title="${h}">${h}</span>
                `;
                
                div.onclick = () => selectHero(h);
                grid.appendChild(div);
            });
            updateUI();
        }

        function selectHero(name) {
            if (currentTurn >= 20 || selectedHeroes.includes(name)) return;

            const turnInfo = sequence[currentTurn];
            const slot = document.getElementById(turnInfo.id);
            const imgName = formatImgName(name);
            
            // Masukkan gambar ke dalam slot Ban/Pick di atas
            slot.innerHTML = `
                <img src="assets/heroes/${imgName}.png" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'60\\' height=\\'60\\'><rect width=\\'60\\' height=\\'60\\' fill=\\'%23334155\\'/></svg>'">
                <div class="slot-name">${name}</div>
            `;
            
            slot.style.background = turnInfo.type === 'ban' ? '#450a0a' : '#1e3a8a';
            
            selectedHeroes.push(name);
            document.getElementById(`hero-${name}`).classList.add('disabled');

            currentTurn++;
            updateUI();
        }

        function updateUI() {
            const turnLabel = document.getElementById('turnLabel');
            const turnStep = document.getElementById('turnStep');
            const btnLanjut = document.getElementById('btnLanjut');

            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));

            if (currentTurn < 20) {
                const turnInfo = sequence[currentTurn];
                turnLabel.innerText = `GILIRAN: ${turnInfo.t === 'A' ? 'Tim A' : 'Tim B'} - ${turnInfo.type.toUpperCase()}`;
                turnStep.innerText = `Langkah ${currentTurn + 1} dari 20`;
                document.getElementById(turnInfo.id).classList.add('active');
                btnLanjut.style.display = 'none'; 
            } else {
                turnLabel.innerText = "DRAFT SELESAI!";
                turnStep.innerText = "Sistem mengunci hero...";
                btnLanjut.style.display = 'block'; 
            }
        }

        function resetDraft() {
            currentTurn = 0;
            selectedHeroes = [];
            document.querySelectorAll('.slot').forEach(s => {
                s.innerHTML = '';
                s.style.background = '#1e293b';
            });
            document.querySelectorAll('.hero-item').forEach(h => h.classList.remove('disabled'));
            updateUI();
        }

        function lanjutKeLog() {
            // 1. Ambil data PICK (yang sudah ada sebelumnya)
            // Asumsi: kamu menyimpannya dalam bentuk string yang dipisah koma
            const stringPicksA = /* ... cara kamu ambil hero pick Tim A ... */;
            const stringPicksB = /* ... cara kamu ambil hero pick Tim B ... */;

            // 2. KODE BARU: Ambil data BAN
            // Jika di simulator kamu Ban disimpan di array, gabungkan dengan .join(', ')
            // Jika di input text, cukup ambil .value-nya
            const stringBansA = /* ... cara kamu ambil hero ban Tim A ... */; 
            const stringBansB = /* ... cara kamu ambil hero ban Tim B ... */;

            // 3. Masukkan semuanya ke dalam koper draftHasil
            const draftHasil = {
                teamAHeroes: stringPicksA,
                teamBHeroes: stringPicksB,
                teamABans: stringBansA, // 👈 INI YANG SEBELUMNYA HILANG!
                teamBBans: stringBansB  // 👈 INI YANG SEBELUMNYA HILANG!
            };

            // Simpan ke LocalStorage dan pindah ke Tracker
            localStorage.setItem('draftHasil', JSON.stringify(draftHasil));
            window.location.href = 'tracker.html';
        }

        init();
    </script>
</body>
</html>
