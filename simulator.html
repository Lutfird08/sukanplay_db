<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Draft Simulator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 250px 1fr 250px; gap: 20px; }
        
        .header { grid-column: 1 / -1; text-align: center; margin-bottom: 10px; background: #1e293b; padding: 15px; border-radius: 8px; border-top: 4px solid #3b82f6;}
        .turn-indicator { font-size: 24px; font-weight: bold; color: #eab308; margin-top: 10px; letter-spacing: 1px;}
        
        /* Panel Samping (Picks & Bans) */
        .side-panel { background: #1e293b; padding: 15px; border-radius: 12px; border: 1px solid #334155; display: flex; flex-direction: column;}
        .team-title { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #334155;}
        
        .slot-title { font-size: 11px; color: #94a3b8; font-weight: bold; margin-top: 10px; margin-bottom: 5px; text-transform: uppercase;}
        .hero-slot { background: #0f172a; border: 1px dashed #64748b; height: 50px; border-radius: 6px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; transition: 0.3s;}
        
        .slot-pick-A { border-color: #3b82f6; color: #93c5fd; }
        .slot-pick-B { border-color: #ef4444; color: #fca5a5; }
        .slot-ban { border-color: #64748b; color: #cbd5e1; height: 35px; font-size: 12px; background: #1e293b;}
        
        .active-turn { background: #eab308 !important; color: #0f172a !important; border: 2px solid white !important; box-shadow: 0 0 10px #eab308; }

        /* Area Tengah (Hero Pool) */
        .center-panel { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; display: flex; flex-direction: column;}
        .search-bar { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #3b82f6; color: white; border-radius: 8px; margin-bottom: 20px; font-size: 16px;}
        
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; overflow-y: auto; max-height: 500px; padding-right: 5px;}
        .hero-card { background: #0f172a; border: 1px solid #334155; padding: 10px 5px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s;}
        .hero-card:hover { border-color: #eab308; transform: scale(1.05); }
        .hero-card.disabled { opacity: 0.3; pointer-events: none; filter: grayscale(100%); }

        .btn-submit { grid-column: 1 / -1; padding: 15px; background: #10b981; color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 10px; display: none;}
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div style="color: #94a3b8; font-size: 14px;" id="matchInfo">Memuat Data Pertandingan...</div>
            <div class="turn-indicator" id="turnDisplay">MEMPERSIAPKAN DRAFT...</div>
        </div>

        <div class="side-panel" style="border-top: 4px solid #3b82f6;">
            <div class="team-title" style="color: #3b82f6;" id="titleA">Tim Home</div>
            
            <div class="slot-title">Picks (Line Up)</div>
            <div id="picksA"></div>
            
            <div class="slot-title" style="margin-top: 20px;">Bans</div>
            <div id="bansA"></div>
        </div>

        <div class="center-panel">
            <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Cari nama hero..." onkeyup="filterHeroes()">
            <div class="hero-grid" id="heroGrid"></div>
        </div>

        <div class="side-panel" style="border-top: 4px solid #ef4444;">
            <div class="team-title" style="color: #ef4444;" id="titleB">Tim Away</div>
            
            <div class="slot-title">Picks (Line Up)</div>
            <div id="picksB"></div>
            
            <div class="slot-title" style="margin-top: 20px;">Bans</div>
            <div id="bansB"></div>
        </div>

        <button id="btnLanjut" onclick="lanjutKeLog()" class="btn-submit">DRAFT SELESAI! LANJUT KE RUANG GANTI ➡</button>
    </div>

    <script>
        // 1. Data Setup & Daftar Hero
        const matchSetup = JSON.parse(localStorage.getItem('matchSetup')) || { teamA: "Tim A", teamB: "Tim B", firstPick: "A", currentGame: 1 };
        
        // Sampel Daftar Hero MLBB
        const heroList = [
            "Ling", "Fanny", "Chou", "Pharsa", "Kaja", "Nolan", "Joy", "Mathilda", "Diggie", "Angela",
            "Fredrinn", "Terizla", "Novaria", "Brody", "Minotaur", "Wanwan", "Guinevere", "Bruno", "Claude", "Irithel",
            "Lylia", "Valentina", "Yu Zhong", "Arlott", "Baxia", "Akai", "Karrie", "Beatrix", "Ruby", "Khufra",
            "Faramis", "Gord", "Vexana", "Martis", "Lancelot", "Paquito", "Benedetta", "Esmeralda", "Uranus", "Edith"
        ].sort();

        // 2. STATE MACHINE LOGIC (Mesin Status Draft)
        let currentStep = 0;
        let draftLog = []; // Menyimpan objek: { team: 'A', type: 'Pick', hero: 'Ling' }

        // Urutan Resmi MLBB (20 Langkah). 'A' adalah Tim First Pick.
        const baseSequence = [
            { t: 'A', a: 'Ban' }, { t: 'B', a: 'Ban' }, { t: 'A', a: 'Ban' }, { t: 'B', a: 'Ban' }, { t: 'A', a: 'Ban' }, { t: 'B', a: 'Ban' }, // Phase 1 Ban
            { t: 'A', a: 'Pick' }, { t: 'B', a: 'Pick' }, { t: 'B', a: 'Pick' }, { t: 'A', a: 'Pick' }, { t: 'A', a: 'Pick' }, { t: 'B', a: 'Pick' }, // Phase 1 Pick
            { t: 'B', a: 'Ban' }, { t: 'A', a: 'Ban' }, { t: 'B', a: 'Ban' }, { t: 'A', a: 'Ban' }, // Phase 2 Ban
            { t: 'B', a: 'Pick' }, { t: 'A', a: 'Pick' }, { t: 'A', a: 'Pick' }, { t: 'B', a: 'Pick' }  // Phase 2 Pick
        ];

        // Sesuaikan urutan jika Tim B yang First Pick
        let draftSequence = baseSequence.map(step => {
            if (matchSetup.firstPick === 'A') return step;
            return { t: step.t === 'A' ? 'B' : 'A', a: step.a }; // Tukar A jadi B, B jadi A
        });

        // 3. INISIALISASI UI
        window.onload = () => {
            document.getElementById('titleA').innerText = matchSetup.teamA;
            document.getElementById('titleB').innerText = matchSetup.teamB;
            document.getElementById('matchInfo').innerText = `Game ${matchSetup.currentGame} | First Pick: ${matchSetup.firstPick === 'A' ? matchSetup.teamA : matchSetup.teamB}`;
            
            renderHeroGrid();
            renderSlots();
            updateTurnDisplay();
        };

        function renderHeroGrid() {
            const grid = document.getElementById('heroGrid');
            grid.innerHTML = heroList.map(h => `
                <div class="hero-card" id="hero_${h.replace(/\s+/g, '')}" onclick="pilihHero('${h}')">
                    ${h}
                </div>
            `).join('');
        }

        // Render kerangka kosong untuk Picks dan Bans
        function renderSlots() {
            const createSlots = (count, className) => Array(count).fill(`<div class="hero-slot ${className}">-</div>`).join('');
            
            document.getElementById('picksA').innerHTML = createSlots(5, 'slot-pick-A');
            document.getElementById('bansA').innerHTML = createSlots(5, 'slot-ban');
            document.getElementById('picksB').innerHTML = createSlots(5, 'slot-pick-B');
            document.getElementById('bansB').innerHTML = createSlots(5, 'slot-ban');
        }

        // 4. LOGIKA PEMILIHAN HERO
        function pilihHero(heroName) {
            if (currentStep >= draftSequence.length) return; // Draft sudah selesai

            // Cek apakah hero sudah dipilih/diban sebelumnya
            if (draftLog.find(d => d.hero === heroName)) return;

            const currentAction = draftSequence[currentStep];
            
            // Catat ke Log (Sangat Penting untuk lanjutKeLog)
            draftLog.push({
                team: currentAction.t,
                type: currentAction.a,
                hero: heroName
            });

            // Matikan hero di daftar tengah
            document.getElementById(`hero_${heroName.replace(/\s+/g, '')}`).classList.add('disabled');

            // Perbarui UI Panel Samping
            updateSidePanels();

            // Lanjut ke langkah berikutnya
            currentStep++;
            updateTurnDisplay();
        }

        function updateSidePanels() {
            // Reset kerangka
            renderSlots();

            // Isi ulang berdasarkan draftLog
            let pA = 0, bA = 0, pB = 0, bB = 0;
            const picksAEl = document.getElementById('picksA').children;
            const bansAEl = document.getElementById('bansA').children;
            const picksBEl = document.getElementById('picksB').children;
            const bansBEl = document.getElementById('bansB').children;

            draftLog.forEach(log => {
                if (log.team === 'A' && log.type === 'Pick') { picksAEl[pA].innerText = log.hero; pA++; }
                if (log.team === 'A' && log.type === 'Ban')  { bansAEl[bA].innerText = log.hero; bA++; }
                if (log.team === 'B' && log.type === 'Pick') { picksBEl[pB].innerText = log.hero; pB++; }
                if (log.team === 'B' && log.type === 'Ban')  { bansBEl[bB].innerText = log.hero; bB++; }
            });
        }

        function updateTurnDisplay() {
            const display = document.getElementById('turnDisplay');
            
            if (currentStep >= draftSequence.length) {
                display.innerText = "✅ DRAFT SELESAI";
                display.style.color = "#10b981";
                document.getElementById('btnLanjut').style.display = 'block';
                document.getElementById('searchInput').disabled = true;
                return;
            }

            const step = draftSequence[currentStep];
            const teamName = step.t === 'A' ? matchSetup.teamA : matchSetup.teamB;
            const color = step.t === 'A' ? '#3b82f6' : '#ef4444';
            const actionText = step.a.toUpperCase();

            display.innerHTML = `<span style="color:${color}">${teamName}</span> - GILIRAN <span style="text-decoration: underline;">${actionText}</span>`;
        }

        function filterHeroes() {
            const txt = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.hero-card').forEach(el => {
                if (el.innerText.toLowerCase().includes(txt)) el.style.display = 'block';
                else el.style.display = 'none';
            });
        }

        // ==========================================
        // 5. PENYIMPANAN DATA (PERBAIKAN BUG UTAMA)
        // ==========================================
        function lanjutKeLog() {
            if (currentStep < draftSequence.length) {
                return alert("Selesaikan draft terlebih dahulu!");
            }

            // FILTER KETAT Berdasarkan Objek (Bukan Split String)
            const teamAHeroes = draftLog.filter(d => d.team === 'A' && d.type === 'Pick').map(d => d.hero).join(', ');
            const teamBHeroes = draftLog.filter(d => d.team === 'B' && d.type === 'Pick').map(d => d.hero).join(', ');
            
            const teamABans = draftLog.filter(d => d.team === 'A' && d.type === 'Ban').map(d => d.hero).join(', ');
            const teamBBans = draftLog.filter(d => d.team === 'B' && d.type === 'Ban').map(d => d.hero).join(', ');

            // Eksekusi: Masukkan ke koper draftHasil
            const draftHasil = {
                teamAHeroes: teamAHeroes,
                teamBHeroes: teamBHeroes,
                teamABans: teamABans,
                teamBBans: teamBBans
            };

            // Simpan dan Lanjut ke Ruang Ganti
            localStorage.setItem('draftHasil', JSON.stringify(draftHasil));
            window.location.href = 'tracker.html';
        }
    </script>
</body>
</html>
