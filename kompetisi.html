<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Jadwal Pertandingan</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Week Navigation */
        .week-nav { display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 10px; }
        .week-btn { 
            padding: 10px 20px; background: #1e293b; border: 1px solid #334155; 
            border-radius: 8px; color: #94a3b8; cursor: pointer; font-weight: bold; white-space: nowrap;
        }
        .week-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }

        /* Match Cards */
        .match-card { 
            background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 15px; 
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; border: 1px solid #334155;
        }
        .team { text-align: center; font-weight: bold; font-size: 18px; }
        .vs-box { text-align: center; padding: 0 30px; }
        .vs-text { font-size: 12px; color: #64748b; font-weight: bold; margin-bottom: 5px; }
        .match-status { font-size: 11px; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
        .status-upcoming { background: #334155; color: #cbd5e1; }
        .status-completed { background: #064e3b; color: #10b981; }

        .actions { grid-column: 1 / -1; display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid #334155; padding-top: 15px; }
        .btn-action { flex: 1; padding: 8px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="compName">Loading...</h1>
            <a href="home.html" style="color: #3b82f6; text-decoration: none; font-weight: bold;">⬅ Kembali</a>
        </div>

        <div class="week-nav" id="weekNav">
            </div>

        <div id="matchContainer">
            </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const compId = urlParams.get('id');
        let currentWeek = 1;
        let allSchedules = [];

        // PERBAIKAN: Hapus loop 1-9 dari sini, cukup panggil loadSchedules
        window.onload = async function() {
            await loadSchedules();
        }

        async function loadSchedules() {
            // 1. Ambil Nama Kompetisi secara dinamis
            try {
                const compRes = await fetch('http://localhost:3000/api/competitions');
                const comps = await compRes.json();
                const currentComp = comps.find(c => c.id == compId);
                document.getElementById('compName').innerText = currentComp ? currentComp.name : "Jadwal Turnamen";
            } catch (e) {
                document.getElementById('compName').innerText = "Jadwal Turnamen";
            }

            // 2. Ambil Jadwal Pertandingan
            try {
                const res = await fetch(`http://localhost:3000/api/schedules/${compId}`);
                allSchedules = await res.json();
                
                // 3. LOGIKA BARU: Dynamic Week Generation
                // Mencari angka week_number yang unik (tidak duplikat) dan mengurutkannya
                const weeks = [...new Set(allSchedules.map(s => s.week_number))].sort((a, b) => a - b);
                
                const nav = document.getElementById('weekNav');
                nav.innerHTML = '';
                
                if(weeks.length === 0) {
                    nav.innerHTML = '<span style="color:#94a3b8;">Belum ada jadwal rilis.</span>';
                } else {
                    // Set currentWeek otomatis ke minggu paling awal yang ada di database
                    currentWeek = weeks[0]; 
                    
                    // Buat tombol sesuai jumlah minggu yang ditemukan
                    weeks.forEach((w, index) => {
                        nav.innerHTML += `<button class="week-btn ${index === 0 ? 'active' : ''}" onclick="changeWeek(${w}, this)">Week ${w}</button>`;
                    });
                }
                
                renderMatches();
            } catch (e) {
                document.getElementById('matchContainer').innerHTML = "<div style='text-align:center; color:#ef4444;'>Gagal memuat jadwal.</div>";
            }
        }

        function changeWeek(week, btn) {
            currentWeek = week;
            document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMatches();
        }

        function renderMatches() {
            const container = document.getElementById('matchContainer');
            container.innerHTML = '';
            
            const filtered = allSchedules.filter(s => s.week_number == currentWeek);
            
            if(filtered.length === 0) {
                container.innerHTML = "<div style='text-align:center; color:#64748b; margin-top:50px;'>Tidak ada jadwal untuk minggu ini.</div>";
                return;
            }

            filtered.forEach(m => {
                const isDone = m.status === 'Completed';
                container.innerHTML += `
                    <div class="match-card">
                        <div class="team" style="color: #3b82f6;">${m.team_home}</div>
                        <div class="vs-box">
                            <div class="vs-text">VS</div>
                            <span class="match-status ${isDone?'status-completed':'status-upcoming'}">${m.status}</span>
                        </div>
                        <div class="team" style="color: #ef4444;">${m.team_away}</div>
                        
                        <div class="actions">
                            ${!isDone ? `
                                <button class="btn-action" style="background:#3b82f6; color:white;" onclick="mulaiMatch(${m.id}, 'live')">⚡ LIVE TRACKER</button>
                                <button class="btn-action" style="background:#10b981; color:white;" onclick="mulaiMatch(${m.id}, 'quick')">📝 QUICK INPUT</button>
                            ` : `
                                <button class="btn-action" style="background:#1e293b; color:#94a3b8;" onclick="location.href='riwayat.html'">📊 LIHAT ANALISIS</button>
                            `}
                        </div>
                    </div>
                `;
            });
        }

        function mulaiMatch(scheduleId, mode) {
            localStorage.setItem('activeScheduleId', scheduleId);
            const target = mode === 'live' ? 'index.html' : 'quick_input.html';
            location.href = target + "?schedule_id=" + scheduleId;
        }
    </script>
</body>
</html>
