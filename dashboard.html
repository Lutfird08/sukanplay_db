<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esports Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .header h1 { color: #f8fafc; font-size: 1.8rem; }
        .nav-link { color: #3b82f6; text-decoration: none; font-weight: bold; background: #1e293b; padding: 10px 15px; border-radius: 6px; }
        
        /* Filter Section */
        .filter-panel { background: #1e293b; padding: 15px 20px; border-radius: 12px; border: 1px solid #3b82f6; margin-bottom: 25px; display: flex; gap: 20px; align-items: center; }
        .filter-group { display: flex; align-items: center; gap: 10px; }
        .filter-group label { font-size: 13px; color: #94a3b8; font-weight: bold; text-transform: uppercase; }
        .filter-group select { padding: 8px 12px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 6px; outline: none; }

        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .summary-card { background: #1e293b; padding: 20px; border-radius: 12px; border-left: 4px solid #3b82f6; display: flex; flex-direction: column; justify-content: center; align-items: center;}
        .summary-title { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .summary-value { font-size: 36px; font-weight: bold; color: white; }

        .charts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .chart-card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .chart-card h4 { text-align: center; margin-bottom: 15px; color: #eab308; border-bottom: 1px solid #334155; padding-bottom: 10px; }

        .leaderboard-card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; font-size: 12px; text-transform: uppercase; }
        .rank-1 { color: #eab308; font-weight: bold; font-size: 1.2rem;}
        .rank-2 { color: #cbd5e1; font-weight: bold; }
        .rank-3 { color: #b45309; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>📊 Data Analytics Center</h1>
            <div>
                <a href="riwayat.html" class="nav-link" style="margin-right: 10px;">📜 Riwayat</a>
                <a href="index.html" class="nav-link">⬅ Menu Utama</a>
            </div>
        </div>

        <div class="filter-panel">
            <div class="filter-group">
                <label>🏆 Kompetisi:</label>
                <select id="filterComp" onchange="applyFilters()">
                    <option value="ALL">Semua Kompetisi (Global)</option>
                </select>
            </div>
            <div class="filter-group">
                <label>⚙️ Patch:</label>
                <select id="filterPatch" onchange="applyFilters()">
                    <option value="ALL">Semua Patch</option>
                </select>
            </div>
        </div>

        <div class="summary-grid">
            <div class="summary-card" style="border-left-color: #3b82f6;">
                <div class="summary-title">Total Pertandingan</div>
                <div class="summary-value" id="valTotalMatch">0</div>
            </div>
            <div class="summary-card" style="border-left-color: #10b981;">
                <div class="summary-title">Kemenangan Home</div>
                <div class="summary-value" id="valHomeWin" style="color: #10b981;">0</div>
            </div>
            <div class="summary-card" style="border-left-color: #ef4444;">
                <div class="summary-title">Kemenangan Away</div>
                <div class="summary-value" id="valAwayWin" style="color: #ef4444;">0</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h4 style="color: #3b82f6;">🎮 Top 5 Pick</h4>
                <canvas id="pickChart" height="200"></canvas>
            </div>
            <div class="chart-card">
                <h4 style="color: #ef4444;">🚫 Top 5 Ban (Bertumpuk)</h4>
                <canvas id="banChart" height="200"></canvas>
            </div>
            <div class="chart-card">
                <h4 style="color: #eab308;">🔥 Top 5 Presence (Pick/Ban)</h4>
                <canvas id="presenceChart" height="200"></canvas>
            </div>
        </div>

        <div class="leaderboard-card">
            <h3 style="color: white; margin-bottom: 15px;">👑 Top KDA Leaderboard</h3>
            <table>
                <thead><tr><th>Rank</th><th>Pemain</th><th>K</th><th>D</th><th>A</th></tr></thead>
                <tbody id="leaderboardBody">
                    <tr><td colspan="5" style="text-align:center;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        Chart.defaults.color = '#94a3b8';

        let rawAnalyticsData = []; // Simpan data mentah dari server
        let chartInstances = {}; // Simpan instance chart untuk di-destroy saat update

        window.onload = async function() {
            await loadFilters();
            await fetchAnalyticsData();
        };

        // 1. Memuat Opsi Dropdown Filter
        async function loadFilters() {
            try {
                const [compRes, patchRes] = await Promise.all([
                    fetch('http://localhost:3000/api/competitions'),
                    fetch('http://localhost:3000/api/patches')
                ]);
                const comps = await compRes.json();
                const patches = await patchRes.json();

                const compSelect = document.getElementById('filterComp');
                comps.forEach(c => compSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`);

                const patchSelect = document.getElementById('filterPatch');
                patches.forEach(p => patchSelect.innerHTML += `<option value="${p.id}">${p.version}</option>`);
            } catch (err) {
                console.error("Gagal memuat filter data.");
            }
        }

        // 2. Memuat Data Utama
        async function fetchAnalyticsData() {
            try {
                const response = await fetch('http://localhost:3000/api/analytics');
                rawAnalyticsData = await response.json();
                applyFilters(); // Render awal dengan status "ALL"
            } catch (error) {
                console.error("Gagal mengambil data analytics:", error);
            }
        }

        // 3. Mesin Filter
        function applyFilters() {
            const compId = document.getElementById('filterComp').value;
            const patchId = document.getElementById('filterPatch').value;

            // Filter data array
            let filteredData = rawAnalyticsData;
            
            if (compId !== 'ALL') {
                filteredData = filteredData.filter(m => m.competition_id == compId);
            }
            if (patchId !== 'ALL') {
                filteredData = filteredData.filter(m => m.patch_id == patchId);
            }

            if(filteredData.length === 0) {
                // Jangan render grafiknya jika tidak ada data
                document.getElementById('valTotalMatch').innerText = "0";
                document.getElementById('valHomeWin').innerText = "0";
                document.getElementById('valAwayWin').innerText = "0";
                document.getElementById('leaderboardBody').innerHTML = '<tr><td colspan="5" style="text-align:center; color:#ef4444;">Tidak ada data pada filter ini.</td></tr>';
                return;
            }

            // Eksekusi Render ulang UI
            olahDataRingkasan(filteredData);
            olahDataHero(filteredData);
            olahDataPemain(filteredData);
        }

        // Sisa kode fungsi sama, tapi pastikan chart lama di-destroy sebelum dirender ulang
        function olahDataRingkasan(data) {
            let homeWin = 0; let awayWin = 0;
            data.forEach(match => {
                if(match.winner_name === match.team_home) homeWin++;
                else if(match.winner_name === match.team_away) awayWin++;
            });
            document.getElementById('valTotalMatch').innerText = data.length;
            document.getElementById('valHomeWin').innerText = homeWin;
            document.getElementById('valAwayWin').innerText = awayWin;
        }

        function olahDataHero(data) {
            let pickCount = {}; let presenceCount = {};
            let banPhase1Count = {}; let banPhase2Count = {}; let totalBanCount = {};

            data.forEach(match => {
                const picks = [...(match.team_a_heroes ? match.team_a_heroes.split(',') : []), ...(match.team_b_heroes ? match.team_b_heroes.split(',') : [])];
                picks.forEach(h => {
                    let name = h.trim();
                    if(name) { pickCount[name] = (pickCount[name] || 0) + 1; presenceCount[name] = (presenceCount[name] || 0) + 1; }
                });

                const prosesBanPhase = (bansArray) => {
                    bansArray.forEach((h, index) => {
                        let name = h.trim();
                        if(name) {
                            totalBanCount[name] = (totalBanCount[name] || 0) + 1;
                            presenceCount[name] = (presenceCount[name] || 0) + 1;
                            if (index < 3) banPhase1Count[name] = (banPhase1Count[name] || 0) + 1;
                            else banPhase2Count[name] = (banPhase2Count[name] || 0) + 1;
                        }
                    });
                };
                prosesBanPhase(match.team_a_bans ? match.team_a_bans.split(',') : []);
                prosesBanPhase(match.team_b_bans ? match.team_b_bans.split(',') : []);
            });

            const getTop5 = (dict) => Object.keys(dict).map(k => ({ name: k, count: dict[k] })).sort((a, b) => b.count - a.count).slice(0, 5);

            renderChart('pickChart', 'bar', 'Total Pick', getTop5(pickCount), '#3b82f6');
            renderChart('presenceChart', 'bar', 'Total Pick/Ban', getTop5(presenceCount), '#eab308');
            renderStackedBanChart('banChart', getTop5(totalBanCount), banPhase1Count, banPhase2Count);
        }

        // Helper Render Chart untuk menghancurkan (destroy) kanvas lama agar grafik tidak bertumpuk/glitch
        function renderChart(canvasId, type, label, dataArray, color) {
            if (chartInstances[canvasId]) chartInstances[canvasId].destroy();
            const ctx = document.getElementById(canvasId).getContext('2d');
            chartInstances[canvasId] = new Chart(ctx, {
                type: type,
                data: { labels: dataArray.map(d => d.name), datasets: [{ label: label, data: dataArray.map(d => d.count), backgroundColor: color, borderRadius: 4 }] },
                options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });
        }

        function renderStackedBanChart(canvasId, topBansArray, p1Dict, p2Dict) {
            if (chartInstances[canvasId]) chartInstances[canvasId].destroy();
            const ctx = document.getElementById(canvasId).getContext('2d');
            const labels = topBansArray.map(d => d.name);
            chartInstances[canvasId] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Ban Phase 1', data: labels.map(n => p1Dict[n] || 0), backgroundColor: '#ef4444' },
                        { label: 'Ban Phase 2', data: labels.map(n => p2Dict[n] || 0), backgroundColor: '#7f1d1d', borderRadius: { topLeft: 4, topRight: 4 } }
                    ]
                },
                options: { responsive: true, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } } } }
            });
        }

        function olahDataPemain(data) {
            let playerStats = {};
            data.forEach(match => {
                if(!match.player_stats) return;
                let pData = typeof match.player_stats === 'string' ? JSON.parse(match.player_stats) : match.player_stats;
                pData.forEach(p => {
                    if(!playerStats[p.name]) playerStats[p.name] = { k: 0, d: 0, a: 0 };
                    playerStats[p.name].k += p.k; playerStats[p.name].d += p.d; playerStats[p.name].a += p.a;
                });
            });

            let sortedPlayers = Object.keys(playerStats).map(name => ({ name: name, stats: playerStats[name] })).sort((a, b) => b.stats.k - a.stats.k).slice(0, 10);
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';
            sortedPlayers.forEach((p, index) => {
                let rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : '';
                let rankTeks = index === 0 ? '👑 1' : index + 1;
                tbody.innerHTML += `<tr><td class="${rankClass}">${rankTeks}</td><td style="font-weight:bold; color:white;">${p.name}</td><td style="color:#10b981;">${p.stats.k}</td><td style="color:#ef4444;">${p.stats.d}</td><td style="color:#eab308;">${p.stats.a}</td></tr>`;
            });
        }
    </script>
</body>
</html>
